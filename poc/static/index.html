<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="İstanbul Türkçesi telaffuz değerlendirmesi ve eğitmen tarzı geri bildirim." />
<meta name="theme-color" content="#0a0a0b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Diksiyon" />
<link rel="manifest" href="/static/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>İstanbul Türkçesi Diksiyon</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
        },
      },
    },
  };
</script>

<style>
  html { -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', system-ui, sans-serif; font-feature-settings: "cv11", "ss01"; }
  *:focus-visible { outline: 2px solid #18181b; outline-offset: 2px; border-radius: 6px; }
  /* Custom scrollbar (sidebar) */
  .scroll-thin::-webkit-scrollbar { width: 6px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  .scroll-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
  /* Pulse for recording */
  @keyframes pulseRing {
    0% { box-shadow: 0 0 0 0 rgba(244,63,94,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(244,63,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(244,63,94,0); }
  }
  .recording-ring { animation: pulseRing 1.4s ease-out infinite; }
  /* Word error markers */
  .word-err {
    padding: 1px 4px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  .word-err:hover { transform: translateY(-1px); }
  .word-err.kelime { color: #e11d48; box-shadow: inset 0 -2px 0 #e11d48; }
  .word-err.kritik_unsuz { color: #c2410c; box-shadow: inset 0 -2px 0 #c2410c; }
  .word-err.r_yutulmasi, .word-err.h_yutulmasi { color: #b45309; box-shadow: inset 0 -2px 0 #b45309; }
  .word-err.vurgu_yeri { color: #4f46e5; box-shadow: inset 0 -2px 0 #4f46e5; }
  /* Listen-on-word inline button */
  .word-listen-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; margin-left: 2px;
    border-radius: 999px; background: #f4f4f5; color: #71717a;
    font-size: 8px; cursor: pointer; user-select: none;
    border: 1px solid #e4e4e7; transition: all 0.15s; vertical-align: 2px;
  }
  .word-listen-btn:hover { background: #18181b; color: white; border-color: #18181b; }
  .word-listen-btn.playing { background: #10b981; color: white; border-color: #10b981; }
  /* Toast */
  .toast-enter { animation: slideUp 0.2s ease-out; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>

<body class="bg-stone-100 text-zinc-900 antialiased">

<div class="lg:grid lg:grid-cols-[240px_1fr] min-h-screen">

  <!-- SIDEBAR -->
  <aside class="bg-zinc-950 text-zinc-100 lg:sticky lg:top-0 lg:h-screen flex flex-col z-50">
    <header class="p-5 lg:p-6 flex items-center gap-3 border-b border-zinc-800">
      <div class="w-9 h-9 rounded-lg bg-white text-zinc-950 flex items-center justify-center font-bold text-sm tracking-tight">İT</div>
      <div class="leading-tight">
        <div class="font-semibold text-[15px] tracking-tight">İstanbul Türkçesi</div>
        <div class="text-[12px] text-zinc-500 font-normal">Diksiyon eğitmeni</div>
      </div>
    </header>
    <nav id="tabs" class="p-3 flex flex-row lg:flex-col gap-1 flex-1 overflow-x-auto lg:overflow-x-hidden lg:overflow-y-auto scroll-thin"></nav>
    <footer class="hidden lg:block p-4 border-t border-zinc-800 text-[11px] text-zinc-500">
      v0.2 · POC · <a href="https://github.com/Tunacodin/IstanbulTurkcesiApp" target="_blank" rel="noopener" class="underline hover:text-zinc-300">GitHub</a>
    </footer>
  </aside>

  <!-- MAIN -->
  <main class="px-5 py-6 lg:px-10 lg:py-8 max-w-7xl">

    <!-- Page header -->
    <div class="flex items-start justify-between gap-4 flex-wrap mb-1">
      <div>
        <h1 id="page-title" class="text-2xl lg:text-[28px] font-semibold tracking-tight text-zinc-900">Yükleniyor…</h1>
        <p id="page-sub" class="text-sm text-zinc-500 mt-1"></p>
      </div>
      <div id="page-actions" class="flex items-center gap-2"></div>
    </div>

    <!-- Search bar -->
    <div id="search-wrap" class="mt-5 mb-6 max-w-md">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
        <input id="search" type="text" placeholder="Alıştırma ara…" class="w-full pl-9 pr-3 py-2.5 bg-white border border-zinc-200 rounded-xl text-sm placeholder:text-zinc-400 focus:outline-none focus:ring-2 focus:ring-zinc-900/10 focus:border-zinc-300" />
      </div>
    </div>

    <!-- Card grid / progress / videos container -->
    <div id="content" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3"></div>

    <div id="empty" class="hidden mt-4 p-10 text-center text-sm text-zinc-500 border border-dashed border-zinc-300 rounded-2xl">
      Bu kategoride alıştırma yok.
    </div>
  </main>
</div>

<!-- Tooltip -->
<div id="tooltip" class="hidden fixed z-[1000] max-w-xs bg-zinc-900 text-zinc-50 text-[13px] leading-relaxed px-3.5 py-2.5 rounded-xl shadow-2xl border border-zinc-800 pointer-events-none"></div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[1100] bg-zinc-900 text-zinc-50 text-sm px-4 py-2.5 rounded-xl shadow-2xl"></div>

<script>
// ============================================================
// CONSTANTS + STATE
// ============================================================
const API = location.origin;
const $ = id => document.getElementById(id);

const TYPES = {
  all:        { label: 'Tüm Alıştırmalar', icon: '✦' },
  kelime:     { label: 'Kelime',          icon: '🔤' },
  'cümle':    { label: 'Cümle',           icon: '💬' },
  cumle:      { label: 'Cümle',           icon: '💬' },
  tekerleme:  { label: 'Tekerleme',       icon: '🌀' },
  paragraf:   { label: 'Paragraf',        icon: '📄' },
  _videos:    { label: 'Video Sözlüğü',   icon: '📚' },
  _progress:  { label: 'İlerleme',        icon: '📊' },
};

const VERDICT = {
  mukemmel: { label: 'Mükemmel', icon: '⭐', cls: 'bg-emerald-100 text-emerald-800 border-emerald-200' },
  iyi: { label: 'İyi', icon: '👍', cls: 'bg-sky-100 text-sky-800 border-sky-200' },
  gelistirilebilir: { label: 'Geliştirilebilir', icon: '⚠️', cls: 'bg-amber-100 text-amber-800 border-amber-200' },
  tekrar: { label: 'Tekrar dene', icon: '🔁', cls: 'bg-rose-100 text-rose-800 border-rose-200' },
};

const KIND_LABELS = {
  kelime: 'Kelime hatası',
  kritik_unsuz: 'Ünsüz değişimi (k↔g, t↔d)',
  r_yutulmasi: 'R yutulması',
  h_yutulmasi: 'H yutulması',
  vurgu_yeri: 'Vurgu yeri sapması',
  'uzun-unlu': 'Uzun ünlü kısa',
  dogallik: 'Konuşma tarzı',
  vurgu: 'Vurgu/tonlama',
  telaffuz: 'Telaffuz',
};
const WORD_ERROR_KINDS = new Set(['kelime','kritik_unsuz','r_yutulmasi','h_yutulmasi','vurgu_yeri']);

const STORAGE_KEY = 'diksiyon_history_v1';
const MAX_HISTORY = 200;

const STATE = {
  exercises: [],
  activeType: 'all',
  search: '',
  availableClips: new Set(),
  videoLibrary: [],
  videoWordCount: 0,
  cards: new Map(), // id → { recorder, chunks, blob, blobUrl, result, status }
  audioPlaying: null,
};

// ============================================================
// UTILS
// ============================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalizeWord(w) {
  return w.replace(/I/g,'ı').replace(/İ/g,'i').toLowerCase().replace(/[^\wçğışöü]/g,'');
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveAttempt(rec) {
  const h = loadHistory();
  h.push(rec);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h.slice(-MAX_HISTORY))); } catch {}
}
function clearHistory() {
  if (!confirm('Tüm kayıtları silmek istediğinden emin misin?')) return;
  localStorage.removeItem(STORAGE_KEY);
  buildTabs();
  if (STATE.activeType === '_progress') renderProgress();
  toast('Kayıtlar silindi');
}
function toast(msg, ms = 2000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  t.classList.add('toast-enter');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.classList.add('hidden'); t.classList.remove('toast-enter'); }, ms);
}

// ============================================================
// AUDIO — server first, browser TTS fallback
// ============================================================
function stopAllAudio() {
  if (STATE.audioPlaying) { try { STATE.audioPlaying.pause(); } catch {} STATE.audioPlaying = null; }
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll('.playing').forEach(el => el.classList.remove('playing'));
}
async function playUrl(url) {
  return new Promise((resolve, reject) => {
    const a = new Audio(url);
    a.onended = () => resolve(true);
    a.onerror = e => reject(e);
    a.play().then(() => { STATE.audioPlaying = a; }).catch(reject);
  });
}
function speakTr(text) {
  if (!('speechSynthesis' in window)) { toast('Tarayıcı TTS desteklemiyor'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'tr-TR';
  u.rate = 0.88;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
}
async function playReference(exercise, btnEl) {
  stopAllAudio();
  if (btnEl) btnEl.classList.add('playing');
  const cleanup = () => btnEl && btnEl.classList.remove('playing');
  try {
    await playUrl(API + '/reference/' + encodeURIComponent(exercise.id));
    cleanup();
  } catch {
    // Sunucuda dosya yoksa tarayıcı TTS
    cleanup();
    speakTr(exercise.text);
  }
}
async function playWordClip(word, btnEl) {
  stopAllAudio();
  if (btnEl) btnEl.classList.add('playing');
  const cleanup = () => btnEl && btnEl.classList.remove('playing');
  try {
    await playUrl(API + '/word-clip/' + encodeURIComponent(normalizeWord(word)));
    cleanup();
  } catch {
    cleanup();
    speakTr(word);
  }
}

// ============================================================
// API loaders
// ============================================================
async function loadExercises() {
  try {
    const res = await fetch(API + '/exercises');
    const data = await res.json();
    STATE.exercises = data.exercises || [];
  } catch (e) {
    $('content').innerHTML = `<div class="col-span-full p-8 bg-rose-50 border border-rose-200 rounded-2xl text-rose-800 text-sm">Alıştırmalar yüklenemedi: ${escapeHtml(String(e))}<br><span class="text-rose-600 text-xs mt-2 block">Backend uyuyor olabilir, ~30sn bekleyip yenile.</span></div>`;
  }
}
async function loadAvailableClips() {
  try {
    const res = await fetch(API + '/available-clips');
    if (res.ok) {
      const d = await res.json();
      STATE.availableClips = new Set(d.words || []);
    }
  } catch {}
}
async function loadVideoLibrary() {
  try {
    const res = await fetch(API + '/videos-with-words');
    if (res.ok) {
      const d = await res.json();
      STATE.videoLibrary = d.videos || [];
      STATE.videoWordCount = STATE.videoLibrary.reduce((s, v) => s + (v.word_count || 0), 0);
      const tab = document.querySelector('[data-type="_videos"] .count');
      if (tab) tab.textContent = STATE.videoWordCount;
    }
  } catch {}
}

// ============================================================
// TABS (sidebar nav)
// ============================================================
function buildTabs() {
  const counts = {};
  const order = [];
  for (const ex of STATE.exercises) {
    if (!(ex.type in counts)) { counts[ex.type] = 0; order.push(ex.type); }
    counts[ex.type]++;
  }
  const tabs = $('tabs');
  tabs.innerHTML = '';
  tabs.appendChild(makeTab('all', counts.__all || STATE.exercises.length));
  for (const t of order) tabs.appendChild(makeTab(t, counts[t]));
  tabs.appendChild(makeTab('_videos', STATE.videoWordCount));
  tabs.appendChild(makeTab('_progress', loadHistory().length));
  setActiveType(STATE.activeType);
}
function makeTab(type, count) {
  const meta = TYPES[type] || { label: type, icon: '•' };
  const btn = document.createElement('button');
  btn.dataset.type = type;
  btn.className = 'tab group flex items-center gap-3 px-3 h-10 rounded-lg text-[13.5px] font-medium text-zinc-400 hover:text-zinc-100 hover:bg-zinc-900 transition-colors flex-shrink-0 lg:flex-shrink whitespace-nowrap';
  btn.innerHTML = `
    <span class="text-base leading-none">${meta.icon}</span>
    <span class="flex-1 text-left">${escapeHtml(meta.label)}</span>
    <span class="count text-[11px] font-semibold px-2 py-0.5 rounded-full bg-zinc-800 text-zinc-500 group-hover:bg-zinc-700 group-hover:text-zinc-300">${count}</span>
  `;
  btn.addEventListener('click', () => setActiveType(type));
  return btn;
}
function setActiveType(type) {
  STATE.activeType = type;
  STATE.search = '';
  $('search').value = '';
  for (const t of document.querySelectorAll('#tabs .tab')) {
    const active = t.dataset.type === type;
    t.classList.toggle('text-zinc-100', active);
    t.classList.toggle('bg-zinc-800', active);
    t.classList.toggle('text-zinc-400', !active);
    const c = t.querySelector('.count');
    if (c) {
      c.classList.toggle('bg-white', active);
      c.classList.toggle('text-zinc-900', active);
      c.classList.toggle('bg-zinc-800', !active);
      c.classList.toggle('text-zinc-500', !active);
    }
  }
  // Search-bar sadece alistirma listelerinde gozuksun
  const showSearch = !['_videos','_progress'].includes(type);
  $('search-wrap').classList.toggle('hidden', !showSearch);

  if (type === '_progress') renderProgress();
  else if (type === '_videos') renderVideos();
  else renderGrid();
}

// ============================================================
// EXERCISE GRID — one card per item, inline buttons
// ============================================================
function filterExercises() {
  let items = STATE.activeType === 'all'
    ? STATE.exercises
    : STATE.exercises.filter(e => e.type === STATE.activeType);
  if (STATE.search) {
    const q = STATE.search.toLowerCase();
    items = items.filter(e =>
      (e.text || '').toLowerCase().includes(q) ||
      (e.focus || '').toLowerCase().includes(q));
  }
  return items;
}
function renderGrid() {
  const items = filterExercises();
  const meta = TYPES[STATE.activeType] || { label: 'Alıştırmalar' };
  $('page-title').textContent = STATE.activeType === 'all' ? 'Tüm Alıştırmalar' : meta.label;
  $('page-sub').textContent = `${items.length} alıştırma · seç → kaydet → eğitmen tarzı geri bildirim al`;
  $('page-actions').innerHTML = '';
  $('content').className = 'grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3';

  if (!items.length) {
    $('content').innerHTML = '';
    $('empty').classList.remove('hidden');
    return;
  }
  $('empty').classList.add('hidden');
  $('content').innerHTML = items.map(cardHtml).join('');
  attachCardHandlers();
}
function diffDots(level) {
  const d = Math.max(1, Math.min(5, level || 1));
  return Array.from({length:5}, (_,i) =>
    `<span class="w-1.5 h-1.5 rounded-full ${i < d ? 'bg-zinc-900' : 'bg-zinc-300'}"></span>`).join('');
}
function cardHtml(ex) {
  const text = ex.text || '';
  const preview = text.length > 100 ? text.slice(0,100).trim() + '…' : text;
  const typeMeta = TYPES[ex.type] || { label: ex.type, icon: '•' };
  const focus = ex.focus ? `<span class="text-[11px] text-zinc-600 bg-zinc-100 px-2 py-0.5 rounded-full font-medium">${escapeHtml(ex.focus)}</span>` : '';
  return `
    <article data-card="${ex.id}" data-type="${ex.type}" class="bg-white rounded-2xl border border-zinc-200 hover:border-zinc-300 hover:shadow-[0_8px_24px_-12px_rgba(0,0,0,0.10)] transition-all duration-200 flex flex-col overflow-hidden">
      <div class="p-5 flex flex-col gap-3 flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-[10px] font-semibold uppercase tracking-wider text-zinc-500">${typeMeta.icon} ${escapeHtml(typeMeta.label)}</span>
          <div class="flex items-center gap-1 ml-auto" title="Zorluk ${ex.difficulty || 1}/5">${diffDots(ex.difficulty)}</div>
        </div>
        <p class="text-[15px] font-semibold leading-snug text-zinc-900 line-clamp-4 min-h-[3.2rem]">${escapeHtml(preview)}</p>
        ${focus ? `<div class="flex items-center gap-2 flex-wrap">${focus}</div>` : ''}
      </div>
      <div class="px-5 pb-4 flex items-center gap-1.5">
        <button data-act="listen" class="flex-1 h-9 rounded-lg bg-zinc-100 hover:bg-zinc-200 text-zinc-900 text-[13px] font-medium inline-flex items-center justify-center gap-1.5 transition-colors">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Dinle
        </button>
        <button data-act="record" class="flex-1 h-9 rounded-lg bg-zinc-900 hover:bg-zinc-800 text-white text-[13px] font-medium inline-flex items-center justify-center gap-1.5 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-14 0m7 7v4m-3 0h6M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/></svg>
          Kaydet
        </button>
      </div>
      <div data-result class="hidden border-t border-zinc-100 bg-stone-50/50 p-4"></div>
    </article>
  `;
}
function attachCardHandlers() {
  document.querySelectorAll('[data-card]').forEach(card => {
    card.querySelectorAll('button[data-act]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        onCardAction(card, btn);
      });
    });
  });
}
async function onCardAction(card, btn) {
  const id = card.getAttribute('data-card');
  const ex = STATE.exercises.find(e => e.id === id);
  if (!ex) return;
  const act = btn.getAttribute('data-act');
  if (act === 'listen') {
    await playReference(ex, btn);
  } else if (act === 'record') {
    await startCardRecording(card, ex, btn);
  } else if (act === 'stop') {
    stopCardRecording(card);
  } else if (act === 'play-mine') {
    playMineForCard(card, btn);
  } else if (act === 'rerecord') {
    resetCardResult(card);
    await startCardRecording(card, ex, card.querySelector('[data-act="record"]'));
  }
}
async function startCardRecording(card, ex, btn) {
  const id = ex.id;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const blobUrl = URL.createObjectURL(blob);
      const st = STATE.cards.get(id) || {};
      st.blob = blob; st.blobUrl = blobUrl; st.recorder = null;
      STATE.cards.set(id, st);
      assessCard(card, ex, blob, btn);
    };
    STATE.cards.set(id, { recorder });
    recorder.start();
    // Buton "Durdur"a donsun
    btn.dataset.act = 'stop';
    btn.className = 'flex-1 h-9 rounded-lg bg-rose-600 hover:bg-rose-700 text-white text-[13px] font-medium inline-flex items-center justify-center gap-1.5 transition-colors recording-ring';
    btn.innerHTML = '<span class="w-2 h-2 bg-white rounded-sm"></span> Durdur';
    // Result panelini "kaydediyor" goster
    const r = card.querySelector('[data-result]');
    r.classList.remove('hidden');
    r.innerHTML = `<div class="flex items-center gap-2 text-sm text-zinc-600"><span class="w-2 h-2 rounded-full bg-rose-500 recording-ring inline-block"></span>Mikrofon dinliyor… metni oku, bitince Durdur.</div>`;
  } catch (e) {
    toast('Mikrofon erişimi reddedildi: ' + e.message);
  }
}
function stopCardRecording(card) {
  const id = card.getAttribute('data-card');
  const st = STATE.cards.get(id);
  if (st && st.recorder && st.recorder.state !== 'inactive') st.recorder.stop();
}
async function assessCard(card, ex, blob, btn) {
  // Buton "Hesaplaniyor"
  btn.dataset.act = '__busy';
  btn.disabled = true;
  btn.className = 'flex-1 h-9 rounded-lg bg-zinc-200 text-zinc-500 text-[13px] font-medium inline-flex items-center justify-center gap-1.5 cursor-not-allowed';

function resetCardResult(card) {

function renderCardResult(card, ex, data) {
  const r = card.querySelector('[data-result]');

  const issues = (data.issues || []).filter(i => i.kind !== 'telaffuz' || (i.score || 1) < 0.5);

  if (otherIssues.length) {

    html += `<div class="flex flex-col gap-1.5">${otherIssues.map(it => issueChipHtml(it)).join('')}</div>`;

  });

}
function issueChipHtml(it) {
  const accent = {
    kelime: 'border-rose-300 bg-rose-50',
    kritik_unsuz: 'border-orange-300 bg-orange-50',
    r_yutulmasi: 'border-amber-300 bg-amber-50',
    h_yutulmasi: 'border-amber-300 bg-amber-50',
    vurgu_yeri: 'border-indigo-300 bg-indigo-50',
    dogallik: 'border-purple-300 bg-purple-50',
  }[it.kind] || 'border-zinc-300 bg-zinc-50';
  const label = (it.target_word || it.char || '').slice(0, 40);
  const advice = (it.advice || '').slice(0, 240);
  return `
    <div class="border ${accent} rounded-lg px-3 py-2 text-[12.5px] leading-relaxed text-zinc-800">
      <div class="flex items-center gap-1.5 flex-wrap">
        <strong class="font-semibold">${escapeHtml(label)}</strong>
        <span class="text-zinc-500">·</span>
        <span class="text-zinc-600">${escapeHtml(KIND_LABELS[it.kind] || it.kind || '')}</span>
      </div>
      ${advice ? `<div class="text-zinc-600 mt-1">${escapeHtml(advice)}</div>` : ''}
    </div>
  `;
}
function renderTargetWithIssues(text, issues) {
  const wordIssues = {};
  for (const it of issues) {
    if (WORD_ERROR_KINDS.has(it.kind) && it.word_index >= 0) wordIssues[it.word_index] = it;
  }
  const tokens = text.split(/(\s+)/);
  let wi = 0;
  return tokens.map(tok => {
    if (/^\s+$/.test(tok)) return tok;
    const issue = wordIssues[wi];
    const norm = normalizeWord(tok);
    const hasClip = STATE.availableClips.has(norm);
    const idx = wi++;
    let inner = escapeHtml(tok);
    if (hasClip) inner += ` <span class="word-listen-btn" data-word="${escapeHtml(norm)}" title="Eğitmen telaffuzu">▶</span>`;
    if (issue) {
      return `<span class="word-err ${escapeHtml(issue.kind)}" data-issue-idx="${idx}">${inner}</span>`;
    }
    return `<span class="inline">${inner}</span>`;
  }).join('');
}
function attachWordTooltips(scope, issues) {
  const byIdx = {};
  for (const it of issues) {
    if (WORD_ERROR_KINDS.has(it.kind) && it.word_index >= 0) byIdx[it.word_index] = it;
  }
  scope.querySelectorAll('.word-err').forEach(span => {
    span.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(span.getAttribute('data-issue-idx'), 10);
      const issue = byIdx[idx]; if (!issue) return;
      showTooltip(span, issue);
    });
  });
}
function attachWordListenButtons(scope) {
  scope.querySelectorAll('.word-listen-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      playWordClip(btn.getAttribute('data-word'), btn);
    });
  });
}
function showTooltip(anchor, issue) {
  const tt = $('tooltip');
  let html = '';
  if (issue.target_word && issue.spoken_word) {
    html += `<div class="mb-1"><b>Hedef:</b> ${escapeHtml(issue.target_word)} <span class="text-zinc-400">·</span> <b>Söylediğin:</b> ${escapeHtml(issue.spoken_word)}</div>`;
  } else if (issue.target_word) {
    html += `<div class="mb-1"><b>Atlanmış:</b> ${escapeHtml(issue.target_word)}</div>`;
  }
  html += escapeHtml(issue.advice || '');
  tt.innerHTML = html;
  tt.classList.remove('hidden');
  const rect = anchor.getBoundingClientRect();
  tt.style.left = Math.min(window.innerWidth - tt.offsetWidth - 12, rect.left) + 'px';
  tt.style.top = (rect.bottom + 8) + 'px';
}
function hideTooltip() { $('tooltip').classList.add('hidden'); }
document.addEventListener('click', e => {
  if (!e.target.closest('.word-err')) hideTooltip();
});

function playMineForCard(card, btn) {
  const id = card.getAttribute('data-card');
  const st = STATE.cards.get(id);
  if (!st || !st.blobUrl) { toast('Henüz kayıt yok'); return; }
  stopAllAudio();
  btn.classList.add('playing');
  const a = new Audio(st.blobUrl);
  a.onended = () => btn.classList.remove('playing');
  a.onerror = () => btn.classList.remove('playing');
  a.play();
  STATE.audioPlaying = a;
}

function attachVideoCardHandlers() {

        if (act === 'vlisten') playWordClip(word, btn);
        else if (act === 'vrecord') startVideoCardRecording(card, word, btn);
        else if (act === 'vstop') stopVideoCardRecording(card);
        else if (act === 'play-mine') playMineForCard(card, btn);
      });

async function startVideoCardRecording(card, word, btn) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const blobUrl = URL.createObjectURL(blob);
      const st = STATE.cards.get('vw_'+word) || {};
      st.blob = blob; st.blobUrl = blobUrl;
      STATE.cards.set('vw_'+word, st);
      btn.disabled = true;
      btn.innerHTML = '⏳ Hesaplanıyor';
      const fd = new FormData();
      fd.append('audio', blob, 'recording.webm');
      fd.append('target_text', word);
      try {
        const res = await fetch(API + '/assess', { method:'POST', body: fd });
        if (!res.ok) {
          card.querySelector('[data-result]').classList.remove('hidden');
          card.querySelector('[data-result]').innerHTML = `<div class="text-xs text-rose-700 bg-rose-50 p-2 rounded-md">Sunucu hatası: ${res.status}</div>`;
        } else {
          const data = await res.json();
          renderVideoCardResult(card, word, data);
          saveAttempt({
            ts: new Date().toISOString(),
            exercise_id: 'video-word-' + word,
            target: data.target_text, score: data.overall_score || 0,
            verdict: data.verdict,
            issues: (data.issues || []).map(i => ({ kind:i.kind, target_word:i.target_word||'', char:i.char||'' })),
          });
          const ht = document.querySelector('[data-type="_progress"] .count');
          if (ht) ht.textContent = loadHistory().length;
        }
      } catch (e) {
        card.querySelector('[data-result]').classList.remove('hidden');
        card.querySelector('[data-result]').innerHTML = `<div class="text-xs text-rose-700 bg-rose-50 p-2 rounded-md">${escapeHtml(String(e))}</div>`;
      } finally {
        btn.disabled = false;
        btn.dataset.act = 'vrecord';
        btn.innerHTML = '🎤 Tekrar';
      }
    };
    STATE.cards.set('vw_'+word, { recorder });
    recorder.start();
    btn.dataset.act = 'vstop';
    btn.className = 'flex-1 h-8 rounded-md bg-rose-600 hover:bg-rose-700 text-white text-[12px] font-medium inline-flex items-center justify-center gap-1 transition-colors recording-ring';
    btn.innerHTML = '■ Durdur';
    const r = card.querySelector('[data-result]');
    r.classList.remove('hidden');
    r.innerHTML = `<div class="text-xs text-zinc-600">Mikrofon dinliyor…</div>`;
  } catch (e) {
    toast('Mikrofon: ' + e.message);
  }
}
function stopVideoCardRecording(card) {
  const word = card.getAttribute('data-video-card');
  const st = STATE.cards.get('vw_'+word);
  if (st && st.recorder && st.recorder.state !== 'inactive') st.recorder.stop();
}

function aggregateStats(history) {
  if (!history.length) return null;
  const scores = history.map(r => r.score);
  const issuesByKind = {};
  const wordErrors = {};
  for (const r of history) {
    for (const it of (r.issues || [])) {
      issuesByKind[it.kind] = (issuesByKind[it.kind] || 0) + 1;
      if (WORD_ERROR_KINDS.has(it.kind) && it.target_word) {
        wordErrors[it.target_word] = (wordErrors[it.target_word] || 0) + 1;
      }
    }
  }
  const sumScore = scores.reduce((a,b) => a+b, 0);
  const lastTen = scores.slice(-10);
  const lastTenAvg = lastTen.reduce((a,b) => a+b, 0) / lastTen.length;
  return {
    total: history.length,
    avgScore: sumScore / history.length,
    bestScore: Math.max(...scores),
    lastTenAvg,
    issuesByKind,
    wordErrors: Object.entries(wordErrors).sort((a,b) => b[1]-a[1]).slice(0, 12),
    history,
  };
}
function renderProgress() {
  const history = loadHistory();
  $('page-title').textContent = 'İlerleme';
  $('page-sub').textContent = history.length ? `${history.length} kayıt · son ${Math.min(50, history.length)} alıştırma grafikte` : 'Henüz kayıt yok';

    ? `<button id="clear-btn" class="text-[12px] text-zinc-500 hover:text-rose-600 px-3 py-1.5 rounded-lg hover:bg-rose-50 transition-colors">🗑 Tüm kayıtları sil</button>`

    return;
  }
  const s = aggregateStats(history);
  const issueRows = Object.entries(s.issuesByKind).sort((a,b) => b[1]-a[1]).map(([k,c]) => {

        <div class="flex-[0_0_32px] text-right text-[12px] text-zinc-500 tabular-nums">${c}</div>
      </div>`;
  }).join('');
  const wordChips = s.wordErrors.length
    ? s.wordErrors.map(([w,c]) => `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-rose-50 border border-rose-200 text-rose-700 text-[12px] font-medium rounded-full">${escapeHtml(w)} <span class="text-rose-500/70">×${c}</span></span>`).join('')
    : '<div class="text-sm text-emerald-700">Henüz kelime hatası yok 🎉</div>';

  $('content').innerHTML = `
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
      <div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <div class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Toplam</div>
        <div class="text-3xl font-bold tracking-tight tabular-nums mt-1">${s.total}</div>
      </div>
      <div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <div class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Ortalama</div>
        <div class="text-3xl font-bold tracking-tight tabular-nums mt-1">${(s.avgScore*100).toFixed(0)}<span class="text-base text-zinc-400 font-normal">/100</span></div>
      </div>
      <div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <div class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Son 10</div>
        <div class="text-3xl font-bold tracking-tight tabular-nums mt-1">${(s.lastTenAvg*100).toFixed(0)}<span class="text-base text-zinc-400 font-normal">/100</span></div>
        <div class="text-[11px] mt-1 ${s.lastTenAvg >= s.avgScore ? 'text-emerald-600' : 'text-amber-600'}">${s.lastTenAvg >= s.avgScore ? '↑ ortalamanın üstünde' : '↓ ortalamanın altında'}</div>
      </div>
      <div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <div class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">En yüksek</div>
        <div class="text-3xl font-bold tracking-tight tabular-nums mt-1">${(s.bestScore*100).toFixed(0)}<span class="text-base text-zinc-400 font-normal">/100</span></div>
      </div>
    </div>
    <div class="bg-white border border-zinc-200 rounded-2xl p-5">
      <div class="text-[13px] font-semibold mb-3">Skor zaman çizelgesi (son ${Math.min(50, s.history.length)})</div>
      <canvas id="score-chart" class="w-full h-44 block"></canvas>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <div class="text-[13px] font-semibold mb-3">En sık hata türleri</div>
        <div class="flex flex-col gap-2.5">${issueRows || '<div class="text-sm text-emerald-700">Henüz hata yok 🎉</div>'}</div>
      </div>
      <div class="bg-white border border-zinc-200 rounded-2xl p-5">
        <div class="text-[13px] font-semibold mb-3">En çok zorlandığın kelimeler</div>
        <div class="flex flex-wrap gap-1.5">${wordChips}</div>
      </div>
    </div>
  `;
  drawScoreChart(s.history.slice(-50));
  document.getElementById('clear-btn')?.addEventListener('click', clearHistory);
}
function drawScoreChart(history) {
  const canvas = document.getElementById('score-chart');
  if (!canvas || !history.length) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = { top: 10, right: 10, bottom: 22, left: 28 };
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;
  ctx.strokeStyle = '#e4e4e7'; ctx.fillStyle = '#a1a1aa';
  ctx.font = '11px Inter, system-ui'; ctx.lineWidth = 1;
  for (const v of [0, 50, 100]) {
    const y = pad.top + plotH - (v / 100) * plotH;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + plotW, y); ctx.stroke();
    ctx.fillText(v.toString(), 4, y + 3);
  }
  const n = history.length;
  const stepX = n > 1 ? plotW / (n - 1) : 0;
  ctx.strokeStyle = '#18181b'; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const x = pad.left + i * stepX;
    const y = pad.top + plotH - history[i].score * plotH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  const colors = { mukemmel:'#059669', iyi:'#0284c7', gelistirilebilir:'#d97706', tekrar:'#e11d48' };
  for (let i = 0; i < n; i++) {
    const x = pad.left + i * stepX;
    const y = pad.top + plotH - history[i].score * plotH;
    ctx.fillStyle = colors[history[i].verdict] || '#18181b';
    ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2); ctx.fill();
  }
}

let searchTimer = null;
$('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    STATE.search = e.target.value.trim();
    if (STATE.activeType !== '_progress' && STATE.activeType !== '_videos') renderGrid();
  }, 150);
});

// ============================================================
// INIT
// ============================================================
async function init() {
  // SW temizligi (eski versiyonlarin cache'ini bosalt)
  if ('serviceWorker' in navigator) {
    const FLAG = 'sw-clean-v6-tailwind';
    if (!localStorage.getItem(FLAG)) {
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) await r.unregister();
        const keys = await caches.keys();
        for (const k of keys) await caches.delete(k);
        localStorage.setItem(FLAG, '1');
      } catch (e) { localStorage.setItem(FLAG, '1'); }
    }
  }
  await Promise.all([loadExercises(), loadAvailableClips(), loadVideoLibrary()]);
  buildTabs();
}
init();
</script>
