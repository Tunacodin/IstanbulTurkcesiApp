<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="İstanbul Türkçesi telaffuz değerlendirmesi ve eğitmen tarzı geri bildirim." />
<meta name="theme-color" content="#fafaf7" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Diksiyon" />
<link rel="manifest" href="/static/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>İstanbul Türkçesi Diksiyon</title>
<style>
  /* shadcn-tarzı tasarım tokenleri (HSL tabanlı, light + dark) */
  :root {
    --background: 0 0% 100%;
    --foreground: 240 10% 3.9%;
    --card: 0 0% 100%;
    --card-foreground: 240 10% 3.9%;
    --popover: 240 10% 3.9%;
    --popover-foreground: 0 0% 98%;
    --primary: 240 5.9% 10%;
    --primary-foreground: 0 0% 98%;
    --secondary: 240 4.8% 95.9%;
    --secondary-foreground: 240 5.9% 10%;
    --muted: 240 4.8% 95.9%;
    --muted-foreground: 240 3.8% 46.1%;
    --accent: 240 4.8% 95.9%;
    --accent-foreground: 240 5.9% 10%;
    --destructive: 0 72% 51%;
    --destructive-foreground: 0 0% 98%;
    --success: 142 71% 29%;
    --warning: 38 92% 35%;
    --info: 180 47% 33%;
    --indigo: 244 75% 41%;
    --orange: 17 100% 32%;
    --purple: 271 50% 35%;
    --border: 240 5.9% 90%;
    --input: 240 5.9% 90%;
    --ring: 240 5% 64.9%;
    --radius: 0.5rem;
    --shadow-sm: 0 1px 2px 0 hsl(240 10% 3.9% / 0.04);
    --shadow-md: 0 4px 6px -1px hsl(240 10% 3.9% / 0.08), 0 2px 4px -2px hsl(240 10% 3.9% / 0.04);
    --shadow-lg: 0 10px 15px -3px hsl(240 10% 3.9% / 0.10), 0 4px 6px -4px hsl(240 10% 3.9% / 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 5.5%;
      --card-foreground: 0 0% 98%;
      --popover: 0 0% 98%;
      --popover-foreground: 240 10% 3.9%;
      --primary: 0 0% 98%;
      --primary-foreground: 240 5.9% 10%;
      --secondary: 240 3.7% 15.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 65% 55%;
      --destructive-foreground: 0 0% 98%;
      --success: 142 70% 45%;
      --warning: 38 92% 50%;
      --info: 180 50% 50%;
      --indigo: 234 89% 74%;
      --orange: 24 100% 60%;
      --purple: 271 76% 70%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
    }
  }

  /* Geriye dönük takma adlar (eski class'larla uyumlu) */
  :root {
    --bg: hsl(var(--background));
    --surface: hsl(var(--card));
    --fg: hsl(var(--foreground));
    --line: hsl(var(--border));
    --line-strong: hsl(var(--ring));
    --accent: hsl(var(--primary));
    --accent-soft: hsl(var(--accent));
    --error: hsl(var(--destructive));
    --error-soft: hsl(var(--destructive) / 0.10);
    --warn: hsl(var(--warning));
    --ok: hsl(var(--success));
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  *:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px hsl(var(--background)), 0 0 0 4px hsl(var(--ring));
    border-radius: var(--radius);
  }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
    font-feature-settings: "cv11", "ss01";
    font-size: 14px; line-height: 1.5;
    margin: 0;
    color: hsl(var(--foreground));
    background: hsl(var(--background));
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }
  ::selection { background: hsl(var(--primary) / 0.18); }

  /* Navbar */
  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: hsl(var(--background) / 0.85);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid hsl(var(--border));
    padding-top: env(safe-area-inset-top);
  }
  .navbar-inner {
    max-width: 1024px; margin: 0 auto;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.011em;
  }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: calc(var(--radius) - 2px);
    background: hsl(var(--foreground));
    color: hsl(var(--background));
    display: grid; place-items: center;
    font-size: 12px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .brand-sub { color: hsl(var(--muted-foreground)); font-weight: 400; font-size: 13px; }
  @media (max-width: 520px) { .brand-sub { display: none; } }

  /* Tabs — shadcn underline tabs */
  .tabs {
    max-width: 1024px; margin: 0 auto;
    display: flex; gap: 2px;
    padding: 0 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-top: 1px solid hsl(var(--border) / 0);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    appearance: none; background: transparent; border: 0;
    padding: 0 14px;
    font: inherit; font-size: 13.5px; font-weight: 500;
    color: hsl(var(--muted-foreground));
    cursor: pointer; white-space: nowrap;
    border-bottom: 2px solid transparent;
    display: inline-flex; align-items: center; gap: 7px;
    height: 44px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab .count {
    background: hsl(var(--secondary));
    color: hsl(var(--muted-foreground));
    border-radius: 999px; padding: 1px 7px;
    font-size: 11px; font-weight: 600;
    line-height: 1.5;
    min-width: 20px; text-align: center;
  }
  .tab:hover { color: hsl(var(--foreground)); }
  .tab.active {
    color: hsl(var(--foreground));
    border-bottom-color: hsl(var(--foreground));
  }
  .tab.active .count {
    background: hsl(var(--foreground));
    color: hsl(var(--background));
  }

  /* Main */
  main {
    max-width: 1024px; margin: 0 auto; padding: 24px;
    padding-left: max(24px, env(safe-area-inset-left));
    padding-right: max(24px, env(safe-area-inset-right));
  }
  @media (max-width: 640px) { main { padding: 16px; } }

  .panel-title {
    font-size: 12px; font-weight: 600;
    color: hsl(var(--muted-foreground));
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 4px 0 14px;
  }

  /* Exercise grid — shadcn cards */
  .exercise-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    margin-bottom: 24px;
  }
  .ex-card {
    background: hsl(var(--card));
    color: hsl(var(--card-foreground));
    border: 1px solid hsl(var(--border));
    border-radius: var(--radius);
    padding: 14px 16px 12px;
    cursor: pointer; text-align: left;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.05s;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 96px;
    font: inherit;
  }
  .ex-card:hover { border-color: hsl(var(--ring) / 0.5); box-shadow: var(--shadow-sm); }
  .ex-card:active { transform: translateY(1px); }
  .ex-card.active {
    border-color: hsl(var(--foreground));
    box-shadow: 0 0 0 3px hsl(var(--foreground) / 0.08);
  }
  .ex-card-text { font-size: 14.5px; font-weight: 500; line-height: 1.45; letter-spacing: -0.005em; }
  .ex-card-meta {
    display: flex; gap: 10px; align-items: center;
    font-size: 12px; color: hsl(var(--muted-foreground));
    margin-top: auto;
    flex-wrap: wrap;
  }
  .difficulty { display: inline-flex; gap: 3px; align-items: center; }
  .difficulty span {
    width: 5px; height: 5px; border-radius: 50%;
    background: hsl(var(--border));
  }
  .difficulty span.on { background: hsl(var(--foreground)); }
  .focus-tag {
    display: inline-flex; align-items: center;
    background: hsl(var(--secondary));
    color: hsl(var(--secondary-foreground));
    padding: 2px 8px; border-radius: calc(var(--radius) - 2px);
    font-size: 11px; font-weight: 500;
    border: 1px solid hsl(var(--border));
  }

  /* Card — shadcn surface */
  .card {
    background: hsl(var(--card));
    color: hsl(var(--card-foreground));
    border: 1px solid hsl(var(--border));
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* Buttons — shadcn variants */
  button {
    font: inherit; font-size: 14px; font-weight: 500;
    padding: 0 16px; height: 40px;
    border-radius: calc(var(--radius) - 2px);
    border: 1px solid hsl(var(--border));
    background: hsl(var(--background));
    color: hsl(var(--foreground));
    cursor: pointer;
    transition: background-color 0.12s, color 0.12s, border-color 0.12s, opacity 0.12s;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    letter-spacing: -0.005em;
  }
  button:hover:not(:disabled) {
    background: hsl(var(--accent));
    color: hsl(var(--accent-foreground));
  }
  button.primary {
    background: hsl(var(--primary));
    color: hsl(var(--primary-foreground));
    border-color: hsl(var(--primary));
  }
  button.primary:hover:not(:disabled) {
    background: hsl(var(--primary) / 0.92);
  }
  button.secondary {
    background: hsl(var(--secondary));
    color: hsl(var(--secondary-foreground));
    border-color: hsl(var(--border));
  }
  button.secondary:hover:not(:disabled) {
    background: hsl(var(--secondary) / 0.85);
  }
  button.danger {
    background: hsl(var(--destructive));
    color: hsl(var(--destructive-foreground));
    border-color: hsl(var(--destructive));
  }
  button.danger:hover:not(:disabled) {
    background: hsl(var(--destructive) / 0.9);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

  .target-display {
    font-size: 20px; line-height: 1.7; letter-spacing: -0.011em;
    margin: 0 0 8px;
    padding: 18px 20px;
    background: hsl(var(--background));
    border: 1px solid hsl(var(--border));
    border-radius: calc(var(--radius) - 2px);
  }
  @media (max-width: 600px) { .target-display { font-size: 18px; padding: 14px 16px; } }

  .word { display: inline-block; position: relative; }
  .word.has-clip { cursor: pointer; }
  .word-listen {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 18px; height: 18px;
    margin-left: 3px;
    border-radius: 999px;
    background: hsl(var(--secondary));
    color: hsl(var(--muted-foreground));
    font-size: 9px;
    cursor: pointer; user-select: none;
    transition: all 0.15s;
    vertical-align: 2px;
    border: 1px solid hsl(var(--border));
  }
  .word-listen:hover {
    background: hsl(var(--foreground));
    color: hsl(var(--background));
    border-color: hsl(var(--foreground));
    transform: scale(1.08);
  }
  .word-listen.playing {
    background: hsl(var(--success));
    color: hsl(var(--primary-foreground));
    border-color: hsl(var(--success));
    animation: pulse 0.6s ease-in-out infinite;
  }
  .word.error {
    padding: 1px 5px; border-radius: 4px;
    cursor: pointer; font-weight: 500;
    transition: background 0.15s;
  }
  .word.error.kelime {
    background: hsl(var(--destructive) / 0.10);
    color: hsl(var(--destructive));
    box-shadow: inset 0 -2px 0 hsl(var(--destructive));
  }
  .word.error.kritik_unsuz {
    background: hsl(var(--orange) / 0.12);
    color: hsl(var(--orange));
    box-shadow: inset 0 -2px 0 hsl(var(--orange));
    text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 4px;
  }
  .word.error.r_yutulmasi, .word.error.h_yutulmasi {
    background: hsl(var(--warning) / 0.14);
    color: hsl(var(--warning));
    box-shadow: inset 0 -2px 0 hsl(var(--warning));
    text-decoration: underline; text-decoration-style: dashed; text-underline-offset: 4px;
  }
  .word.error.vurgu_yeri {
    background: hsl(var(--indigo) / 0.12);
    color: hsl(var(--indigo));
    box-shadow: inset 0 -2px 0 hsl(var(--indigo));
  }

  /* İlerleme paneli */
  .progress-panel { display: grid; gap: 14px; }
  .stat-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  }
  .stat-card {
    background: hsl(var(--card));
    border: 1px solid hsl(var(--border));
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-label {
    font-size: 12px; font-weight: 500;
    color: hsl(var(--muted-foreground));
  }
  .stat-value {
    font-size: 26px; font-weight: 700; letter-spacing: -0.025em;
    color: hsl(var(--foreground));
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .stat-sub {
    font-size: 11px; color: hsl(var(--muted-foreground));
    margin-top: 4px;
  }
  .chart-card {
    background: hsl(var(--card));
    border: 1px solid hsl(var(--border));
    border-radius: var(--radius);
    padding: 18px;
  }
  .chart-title {
    font-size: 11px; font-weight: 600;
    color: hsl(var(--muted-foreground));
    margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  #score-chart { width: 100%; height: 180px; display: block; }
  .issue-bar-row {
    display: flex; align-items: center; gap: 12px;
    margin: 8px 0; font-size: 13px;
  }
  .issue-bar-label {
    flex: 0 0 140px;
    color: hsl(var(--foreground));
  }
  .issue-bar-track {
    flex: 1; height: 8px;
    background: hsl(var(--secondary));
    border-radius: 999px; overflow: hidden;
  }
  .issue-bar-fill {
    height: 100%;
    background: hsl(var(--foreground));
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .issue-bar-count {
    flex: 0 0 32px; text-align: right;
    color: hsl(var(--muted-foreground));
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .word-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .word-chip {
    padding: 4px 10px;
    background: hsl(var(--destructive) / 0.10);
    color: hsl(var(--destructive));
    border: 1px solid hsl(var(--destructive) / 0.20);
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
  }
  .clear-btn {
    font-size: 12px;
    color: hsl(var(--muted-foreground));
    background: transparent; border: 0;
    cursor: pointer; padding: 6px 10px;
    border-radius: calc(var(--radius) - 2px);
  }
  .clear-btn:hover { color: hsl(var(--destructive)); background: hsl(var(--destructive) / 0.08); }

  /* Video sözlüğü */
  .video-section {
    background: hsl(var(--card));
    border: 1px solid hsl(var(--border));
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .video-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 16px; flex-wrap: wrap;
    padding-bottom: 12px;
    border-bottom: 1px solid hsl(var(--border));
  }
  .video-header h3 {
    margin: 0; font-size: 15px; font-weight: 600;
    letter-spacing: -0.011em;
    flex: 1; min-width: 200px;
  }
  .video-meta {
    font-size: 12px; color: hsl(var(--muted-foreground));
    margin-top: 4px;
  }
  .video-link {
    font-size: 12px; font-weight: 500;
    color: hsl(var(--muted-foreground));
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border: 1px solid hsl(var(--border));
    border-radius: calc(var(--radius) - 2px);
    transition: background 0.12s;
  }
  .video-link:hover {
    background: hsl(var(--accent));
    color: hsl(var(--accent-foreground));
  }
  .word-card-grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  }
  .word-practice-card {
    background: hsl(var(--background));
    border: 1px solid hsl(var(--border));
    border-radius: calc(var(--radius) - 2px);
    padding: 12px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .word-practice-card.expanded {
    grid-column: 1 / -1;
    background: hsl(var(--card));
    border-color: hsl(var(--foreground));
    box-shadow: 0 0 0 2px hsl(var(--foreground) / 0.08);
  }
  .wp-text {
    font-size: 15px; font-weight: 600;
    letter-spacing: -0.011em;
    margin-bottom: 8px; word-break: break-word;
    color: hsl(var(--foreground));
  }
  .wp-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
  .wp-btn {
    flex: 1; min-width: 0;
    font: inherit; font-size: 12px; font-weight: 500;
    padding: 0 10px; height: 30px;
    border: 1px solid hsl(var(--border));
    border-radius: calc(var(--radius) - 4px);
    background: hsl(var(--card));
    color: hsl(var(--foreground));
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    transition: all 0.12s;
  }
  .wp-btn:hover:not(:disabled) {
    background: hsl(var(--accent));
    color: hsl(var(--accent-foreground));
  }
  .wp-btn.primary {
    background: hsl(var(--primary));
    color: hsl(var(--primary-foreground));
    border-color: hsl(var(--primary));
  }
  .wp-btn.primary:hover:not(:disabled) {
    background: hsl(var(--primary) / 0.92);
  }
  .wp-btn.recording {
    background: hsl(var(--destructive));
    color: hsl(var(--destructive-foreground));
    border-color: hsl(var(--destructive));
    animation: pulse 1s ease-in-out infinite;
  }
  .wp-btn.playing {
    background: hsl(var(--success));
    color: hsl(var(--primary-foreground));
    border-color: hsl(var(--success));
  }
  .wp-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .wp-result {
    margin-top: 12px;
    padding: 12px 14px;
    background: hsl(var(--secondary) / 0.5);
    border-radius: calc(var(--radius) - 2px);
    font-size: 13px;
    border: 1px solid hsl(var(--border));
  }
  .wp-result-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .wp-pill {
    padding: 2px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    background: hsl(var(--primary));
    color: hsl(var(--primary-foreground));
    letter-spacing: -0.005em;
  }
  .wp-pill.mukemmel { background: hsl(var(--success)); color: hsl(var(--primary-foreground)); }
  .wp-pill.iyi { background: hsl(var(--info)); color: hsl(var(--primary-foreground)); }
  .wp-pill.gelistirilebilir { background: hsl(var(--warning)); color: hsl(var(--primary-foreground)); }
  .wp-pill.tekrar { background: hsl(var(--destructive)); color: hsl(var(--destructive-foreground)); }
  .wp-issue {
    background: hsl(var(--warning) / 0.10);
    border: 1px solid hsl(var(--warning) / 0.25);
    border-left-width: 3px;
    border-left-color: hsl(var(--warning));
    padding: 8px 12px; margin-top: 6px;
    border-radius: calc(var(--radius) - 4px);
    cursor: pointer;
    transition: background 0.12s;
    font-size: 12.5px;
    color: hsl(var(--foreground));
  }
  .wp-issue:hover { background: hsl(var(--warning) / 0.16); }
  .wp-issue.kritik_unsuz {
    border-left-color: hsl(var(--orange));
    background: hsl(var(--orange) / 0.10);
    border-color: hsl(var(--orange) / 0.25);
  }
  .wp-issue.kelime {
    border-left-color: hsl(var(--destructive));
    background: hsl(var(--destructive) / 0.08);
    border-color: hsl(var(--destructive) / 0.20);
  }
  .wp-issue.vurgu_yeri {
    border-left-color: hsl(var(--indigo));
    background: hsl(var(--indigo) / 0.08);
    border-color: hsl(var(--indigo) / 0.20);
  }
  .wp-issue.dogallik {
    border-left-color: hsl(var(--purple));
    background: hsl(var(--purple) / 0.08);
    border-color: hsl(var(--purple) / 0.20);
  }
  .wp-issue-detail {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed hsl(var(--border));

<body>

<header class="navbar">
  <div class="navbar-inner">
    <div class="brand">
      <div class="brand-mark">İT</div>
      <div>
        İstanbul Türkçesi <span class="brand-sub">— Diksiyon</span>
      </div>
    </div>
  </div>
  <nav class="tabs" id="tabs" role="tablist"></nav>
</header>

<main>
  <div class="panel-title" id="list-title">Alıştırma seç</div>
  <div id="exercise-grid" class="exercise-grid"></div>

  <div id="exercise-empty" class="empty" style="display:none">
    Bu kategoride alıştırma yok.
  </div>

  <div id="recorder" class="card" style="display:none">
    <div id="target-display" class="target-display"></div>

    <div class="row" style="margin-top: 12px;">
      <button id="listen-btn" class="secondary">🔊 Doğru telaffuzu dinle</button>
      <button id="record-btn" class="primary">🎤 Kaydı başlat</button>
      <button id="stop-btn" class="danger" disabled>■ Durdur</button>
    </div>
    <p id="status" style="margin-top:10px"></p>

    <audio id="ref-audio" controls preload="none" style="display:none"></audio>
    <audio id="playback" controls style="display:none; margin-top:6px"></audio>
  </div>

  <div id="recorder-placeholder" class="placeholder">
    <div class="placeholder-title">Bir alıştırma seç</div>
    <div>Yukarıdaki sekmeden kelime, cümle, tekerleme veya paragraf seçerek başla.</div>
  </div>

  <div id="result-card" class="card" style="display:none">
    <div id="verdict-box"></div>
    <div id="rendered-target" class="target-display"></div>
    <div id="meta" class="meta-row"></div>
    <details>
      <summary>Karakter detayı</summary>
      <pre id="segments"></pre>
    </details>
  </div>
</main>

<div id="tooltip" class="tooltip" style="display:none"></div>

<script>
const API = location.origin;
const $ = id => document.getElementById(id);

const tabsEl = $('tabs');
const listTitle = $('list-title');
const gridEl = $('exercise-grid');
const emptyEl = $('exercise-empty');
const recorderEl = $('recorder');
const placeholderEl = $('recorder-placeholder');
const targetDisplay = $('target-display');
const listenBtn = $('listen-btn');
const refAudio = $('ref-audio');
const recBtn = $('record-btn');
const stopBtn = $('stop-btn');
const statusEl = $('status');
const resultCard = $('result-card');
const verdictBox = $('verdict-box');
const renderedTarget = $('rendered-target');
const metaEl = $('meta');
const segmentsEl = $('segments');
const playback = $('playback');
const tooltip = $('tooltip');

const TYPE_LABELS = {
  kelime:     { label: 'Kelime',     icon: '🔤' },
  'cümle':    { label: 'Cümle',      icon: '💬' },
  cumle:      { label: 'Cümle',      icon: '💬' },
  tekerleme:  { label: 'Tekerleme',  icon: '🌀' },
  paragraf:   { label: 'Paragraf',   icon: '📄' },
};

const STORAGE_KEY = 'diksiyon_history_v1';
const MAX_HISTORY = 200;

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveAttempt(record) {
  const history = loadHistory();
  history.push(record);
  // En yenilerden MAX_HISTORY kadar tut
  const pruned = history.slice(-MAX_HISTORY);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(pruned)); } catch {}
}

function clearHistory() {
  if (!confirm('Tüm kayıtları silmek istediğinden emin misin?')) return;
  localStorage.removeItem(STORAGE_KEY);
  if (activeType === '_progress') renderProgress();
  buildTabs();  // sayım güncellensin
}

function aggregateStats(history) {
  if (!history.length) return null;
  const scores = history.map(r => r.score);
  const issuesByKind = {};
  const wordErrors = {};
  for (const r of history) {
    for (const it of (r.issues || [])) {
      issuesByKind[it.kind] = (issuesByKind[it.kind] || 0) + 1;
      if ((it.kind === 'kelime' || it.kind === 'kritik_unsuz' ||
           it.kind === 'r_yutulmasi' || it.kind === 'h_yutulmasi') && it.target_word) {
        wordErrors[it.target_word] = (wordErrors[it.target_word] || 0) + 1;
      }
    }
  }
  const sumScore = scores.reduce((a,b) => a+b, 0);
  const lastTen = scores.slice(-10);
  const lastTenAvg = lastTen.reduce((a,b) => a+b, 0) / lastTen.length;
  return {
    total: history.length,
    avgScore: sumScore / history.length,
    bestScore: Math.max(...scores),
    lastTenAvg,
    issuesByKind,
    wordErrors: Object.entries(wordErrors)
      .sort((a,b) => b[1] - a[1]).slice(0, 12),
    history,
  };
}

let mediaRecorder = null;
let chunks = [];
let currentExercise = null;
let allExercises = [];
let activeType = null;
let availableClipsSet = new Set();
let wordClipAudio = null;
let videoLibrary = [];        // {video_id, title, words: [{word, score, ...}]}
let videoWordCount = 0;
let practiceState = {};       // word-card local state: {word: {recording, blob, result, ...}}

async function loadExercises() {
  try {
    const res = await fetch(API + '/exercises');
    const data = await res.json();
    allExercises = data.exercises || [];
    buildTabs();
  } catch (e) {
    listTitle.textContent = 'Alıştırma listesi alınamadı';
    gridEl.innerHTML = `<div class="empty">${escapeHtml(String(e))}</div>`;
  }
}

async function loadAvailableClips() {
  try {
    const res = await fetch(API + '/available-clips');
    if (res.ok) {
      const data = await res.json();
      availableClipsSet = new Set(data.words);
      console.log(`Kelime telaffuz kütüphanesi: ${data.count} kelime`);
      // Mevcut seçili alıştırma varsa metni yeniden render et
      if (currentExercise) renderTargetDisplay(currentExercise.text);
    }
  } catch (e) {
    console.warn('Kelime klipsleri yüklenemedi:', e);
  }
}

async function loadVideoLibrary() {
  try {
    const res = await fetch(API + '/videos-with-words');
    if (res.ok) {
      const data = await res.json();
      videoLibrary = data.videos || [];
      videoWordCount = videoLibrary.reduce((s, v) => s + (v.word_count || 0), 0);
      // Tablar zaten yüklendiyse sayıyı güncelle
      const tab = tabsEl?.querySelector('[data-type="_videos"] .count');
      if (tab) tab.textContent = videoWordCount;
    }
  } catch (e) {
    console.warn('Video sözlüğü yüklenemedi:', e);
  }
}

function normalizeWordForLookup(w) {
  return w.replace(/I/g, 'ı').replace(/İ/g, 'i').toLowerCase()
          .replace(/[^\wçğışöü]/g, '');
}

function playWordClip(word, btn) {
  if (wordClipAudio) {
    wordClipAudio.pause();
    document.querySelectorAll('.word-listen.playing').forEach(b => b.classList.remove('playing'));
  }
  wordClipAudio = new Audio(API + '/word-clip/' + encodeURIComponent(normalizeWordForLookup(word)));
  btn.classList.add('playing');
  wordClipAudio.onended = () => btn.classList.remove('playing');
  wordClipAudio.onerror = () => btn.classList.remove('playing');
  wordClipAudio.play().catch(err => console.warn('Klip çalınamadı:', err));
}

function renderTargetDisplay(text) {
  const tokens = text.split(/(\s+)/);
  let html = '';
  for (const tok of tokens) {
    if (/^\s+$/.test(tok)) { html += tok; continue; }
    const norm = normalizeWordForLookup(tok);
    const hasClip = availableClipsSet.has(norm);
    if (hasClip) {
      html += `<span class="word has-clip">${escapeHtml(tok)}<span class="word-listen" data-word="${escapeHtml(norm)}" title="Diksiyon eğitmeninden örnek dinle">▶</span></span>`;
    } else {
      html += `<span class="word">${escapeHtml(tok)}</span>`;
    }
  }
  targetDisplay.innerHTML = html;
  targetDisplay.querySelectorAll('.word-listen').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      playWordClip(btn.getAttribute('data-word'), btn);
    });
  });
}

function buildTabs() {
  const counts = {};
  const order = [];
  for (const ex of allExercises) {
    if (!(ex.type in counts)) { counts[ex.type] = 0; order.push(ex.type); }
    counts[ex.type]++;
  }
  const wasActive = activeType;
  tabsEl.innerHTML = '';
  tabsEl.appendChild(makeTab('all', 'Tümü', '✦', allExercises.length));
  for (const type of order) {
    const meta = TYPE_LABELS[type] || { label: type, icon: '•' };
    tabsEl.appendChild(makeTab(type, meta.label, meta.icon, counts[type]));
  }
  // Video sözlüğü tab'ı
  tabsEl.appendChild(makeTab('_videos', 'Video Sözlüğü', '📚', videoWordCount));
  // İlerleme tab'ı
  const history = loadHistory();
  tabsEl.appendChild(makeTab('_progress', 'İlerleme', '📊', history.length));
  setActiveType(wasActive || 'all');
}

function makeTab(type, label, icon, count) {
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.setAttribute('role', 'tab');
  btn.dataset.type = type;
  btn.innerHTML = `<span aria-hidden="true">${icon}</span><span>${escapeHtml(label)}</span><span class="count">${count}</span>`;
  btn.addEventListener('click', () => setActiveType(type));
  return btn;
}

function setActiveType(type) {
  activeType = type;
  for (const t of tabsEl.querySelectorAll('.tab')) {
    t.classList.toggle('active', t.dataset.type === type);
  }
  if (type === '_progress') {
    renderProgress();
  } else if (type === '_videos') {
    renderVideoLibrary();
  } else {
    renderGrid();
  }
}

// ============ Video Sözlüğü ============

function renderVideoLibrary() {
  listTitle.textContent = `Eğitmen videoları (${videoLibrary.length})`;
  emptyEl.style.display = 'none';
  recorderEl.style.display = 'none';
  placeholderEl.style.display = 'none';
  resultCard.style.display = 'none';

  if (!videoLibrary.length) {
    gridEl.innerHTML = `<div class="empty" style="grid-column: 1 / -1;">Henüz parse edilmiş video yok.</div>`;
    return;
  }

  let html = '';
  for (const video of videoLibrary) {
    const dur = video.duration_s ? `${Math.round(video.duration_s/60)} dk` : '?';
    const link = video.url ? `<a class="video-link" href="${video.url}" target="_blank" rel="noopener">YouTube'da aç ↗</a>` : '';
    // İlk 30 kelimeyi göster (skor sırasına göre)
    const words = (video.words || []).slice(0, 30);
    const cards = words.map(w => practiceCardHtml(video.video_id, w)).join('');
    html += `
      <div class="video-section" data-video="${video.video_id}">
        <div class="video-header">
          <div style="flex:1; min-width:200px;">
            <h3>${escapeHtml(video.title || video.video_id)}</h3>
            <div class="video-meta">${escapeHtml(video.channel || '')} • ${dur} • ${video.word_count} kelime</div>
          </div>
          ${link}
        </div>
        <div class="word-card-grid">${cards}</div>
        ${video.words.length > 30 ? `<div style="margin-top:10px; text-align:center; color:var(--muted); font-size:13px">+${video.words.length - 30} kelime daha (skor sırasıyla ilk 30 gösteriliyor)</div>` : ''}
      </div>`;
  }
  // gridEl'i panel modu için kullan
  gridEl.style.display = 'block';
  gridEl.innerHTML = html;

  attachPracticeHandlers();
}

function practiceCardHtml(videoId, w) {
  const wordKey = w.word;
  return `
    <div class="word-practice-card" data-word="${escapeHtml(wordKey)}" data-video="${videoId}">
      <div class="wp-text">${escapeHtml(wordKey)}</div>
      <div class="wp-buttons">
        <button class="wp-btn wp-listen" data-action="listen">▶ Dinle</button>
        <button class="wp-btn wp-record primary" data-action="record">🎤 Sıra sende</button>
      </div>
      <div class="wp-result" style="display:none"></div>
    </div>`;
}

function attachPracticeHandlers() {
  for (const card of gridEl.querySelectorAll('.word-practice-card')) {
    card.querySelectorAll('.wp-btn').forEach(btn => {
      btn.addEventListener('click', e => onPracticeAction(card, btn, e));
    });
  }
}

async function onPracticeAction(card, btn, ev) {
  ev.stopPropagation();
  const word = card.getAttribute('data-word');
  const action = btn.getAttribute('data-action');

  if (action === 'listen') {
    playReferenceForCard(word, btn);
  } else if (action === 'record') {
    await startRecordingForCard(card, btn, word);
  } else if (action === 'stop') {
    stopRecordingForCard(card, btn);
  } else if (action === 'play-mine') {
    playMineForCard(card, btn);
  }
}

function playReferenceForCard(word, btn) {
  if (wordClipAudio) {
    wordClipAudio.pause();
    document.querySelectorAll('.wp-btn.playing').forEach(b => b.classList.remove('playing'));
  }
  wordClipAudio = new Audio(API + '/word-clip/' + encodeURIComponent(word));
  btn.classList.add('playing');
  wordClipAudio.onended = () => btn.classList.remove('playing');
  wordClipAudio.onerror = () => btn.classList.remove('playing');
  wordClipAudio.play().catch(err => console.warn('Klip çalınamadı:', err));
}

async function startRecordingForCard(card, btn, word) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const recorder = new MediaRecorder(stream);
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chunks, { type: 'audio/webm' });
      const blobUrl = URL.createObjectURL(blob);
      practiceState[word] = practiceState[word] || {};
      practiceState[word].blob = blob;
      practiceState[word].blobUrl = blobUrl;
      btn.classList.remove('recording');
      btn.disabled = true;
      btn.innerHTML = '⏳ Hesaplanıyor';
      // Sunucuya gönder
      const fd = new FormData();
      fd.append('audio', blob, 'recording.webm');
      fd.append('target_text', word);
      try {
        const res = await fetch(API + '/assess', { method: 'POST', body: fd });
        if (!res.ok) {
          renderPracticeError(card, `Sunucu hatası: ${res.status}`);
        } else {
          const data = await res.json();
          practiceState[word].result = data;
          renderPracticeResult(card, word, data);
          // Histori'ye de yaz (ilerleme paneline yansısın)
          saveAttempt({
            ts: new Date().toISOString(),
            exercise_id: 'video-word-' + word,
            target: data.target_text,
            score: data.overall_score || 0,
            verdict: data.verdict,
            issues: (data.issues || []).map(i => ({
              kind: i.kind, target_word: i.target_word || '', char: i.char || ''
            })),
          });
          const histTab = tabsEl.querySelector('[data-type="_progress"] .count');
          if (histTab) histTab.textContent = loadHistory().length;
        }
      } catch (e) {
        renderPracticeError(card, 'Ağ hatası: ' + e);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🎤 Tekrar';
        btn.setAttribute('data-action', 'record');
      }
    };
    recorder.start();
    practiceState[word] = { recorder };
    btn.classList.add('recording');
    btn.innerHTML = '■ Durdur';
    btn.setAttribute('data-action', 'stop');
    card.classList.add('expanded');
    const r = card.querySelector('.wp-result');
    r.style.display = 'block';
    r.innerHTML = '<span style="color:var(--muted)">Kaydediliyor… kelimeyi söyle, bitince Durdur.</span>';
  } catch (e) {
    alert('Mikrofon erişimi başarısız: ' + e);
  }
}

function stopRecordingForCard(card, btn) {
  const word = card.getAttribute('data-word');
  const st = practiceState[word];
  if (st && st.recorder && st.recorder.state !== 'inactive') {
    st.recorder.stop();
  }
}

function playMineForCard(card, btn) {
  const word = card.getAttribute('data-word');
  const st = practiceState[word];
  if (!st || !st.blobUrl) return;
  document.querySelectorAll('.wp-btn.playing').forEach(b => b.classList.remove('playing'));
  const audio = new Audio(st.blobUrl);
  btn.classList.add('playing');
  audio.onended = () => btn.classList.remove('playing');
  audio.onerror = () => btn.classList.remove('playing');
  audio.play();
}

function renderPracticeError(card, msg) {
  const r = card.querySelector('.wp-result');
  r.style.display = 'block';
  r.innerHTML = `<div style="color:var(--error)">${escapeHtml(msg)}</div>`;
}

function renderPracticeResult(card, word, data) {
  const r = card.querySelector('.wp-result');
  r.style.display = 'block';
  const v = data.verdict || '';
  const score = (data.overall_score || 0) * 100;
  const issues = (data.issues || []).filter(i => i.kind !== 'telaffuz' || i.score < 0.5);

  let html = `
    <div class="wp-result-header">
      <span class="wp-pill ${v}">${headerFor(v)}</span>
      <span style="font-weight:700">${score.toFixed(0)}/100</span>
      <button class="wp-btn" data-action="play-mine" style="margin-left:auto; flex:0; padding:5px 10px">🔁 Söylediğini dinle</button>
    </div>`;

  if (data.transcription !== undefined && data.transcription !== null && data.transcription !== word) {
    html += `<div style="font-size:12px; color:var(--muted); margin-bottom:6px">
      <b>Sen:</b> "${escapeHtml(data.transcription)}" • <b>Hedef:</b> "${escapeHtml(word)}"
    </div>`;
  }

  if (!issues.length) {
    html += '<div style="color:var(--ok); font-size:13px">Bu kelime temiz — devam et!</div>';
  } else {
    html += '<div style="font-size:12px; color:var(--muted); margin-bottom:4px">Sorunlu noktalar (tıkla):</div>';
    for (let i = 0; i < issues.length; i++) {
      const it = issues[i];
      html += `
        <div class="wp-issue ${it.kind || ''}" data-issue-idx="${i}">
          <div><b>${escapeHtml(it.target_word || it.char || '')}</b> — ${escapeHtml(shortLabel(it.kind))}</div>
          <div class="wp-issue-detail" style="display:none">
            ${escapeHtml(it.advice || '')}
          </div>
        </div>`;
    }
  }

  // Bağlam (kelimenin video'daki cümlesi)
  const ctx = (videoLibrary.flatMap(v => v.words || []).find(w => w.word === word) || {}).context;
  if (ctx) {
    html += `<div class="wp-context">"${escapeHtml(ctx.length > 120 ? ctx.slice(0, 120) + '…' : ctx)}"</div>`;
  }

  r.innerHTML = html;

  // Event handlers
  r.querySelectorAll('.wp-issue').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      // Detay aç/kapat
      const det = el.querySelector('.wp-issue-detail');
      if (det) det.style.display = det.style.display === 'none' ? 'block' : 'none';
      // Kullanıcı kaydını çal
      const st = practiceState[word];
      if (st && st.blobUrl) {
        const a = new Audio(st.blobUrl);
        a.play().catch(() => {});
      }
    });
  });
  const playMineBtn = r.querySelector('[data-action="play-mine"]');
  if (playMineBtn) {
    playMineBtn.addEventListener('click', e => {
      e.stopPropagation();
      playMineForCard(card, playMineBtn);
    });
  }
}

function shortLabel(kind) {
  return ({
    kelime: 'Kelime hatası',
    kritik_unsuz: 'Anadolu ağzı / ünsüz değişimi',
    r_yutulmasi: 'R yutulması',
    h_yutulmasi: 'H yutulması',
    vurgu_yeri: 'Vurgu yeri sapması',
    'uzun-unlu': 'Uzun ünlü kısa',
    dogallik: 'Konuşma tarzı',
  })[kind] || (kind || 'Sorun');
}

function renderProgress() {
  const history = loadHistory();
  listTitle.textContent = `İlerleme — ${history.length} kayıt`;
  emptyEl.style.display = 'none';
  recorderEl.style.display = 'none';
  placeholderEl.style.display = 'none';
  resultCard.style.display = 'none';

  if (!history.length) {
    gridEl.innerHTML = `
      <div class="empty" style="grid-column: 1 / -1;">
        Henüz kayıt yok. Bir alıştırma yapıp kayıt başlat butonuna bastığında
        skorların burada görünecek.
      </div>`;
    return;
  }

  const s = aggregateStats(history);

  // Hata türü etiketleri
  const KIND_LABELS = {
    kelime: 'Kelime hatası',
    kritik_unsuz: 'Ünsüz değişimi',
    r_yutulmasi: 'R yutulması',
    h_yutulmasi: 'H yutulması',
    vurgu_yeri: 'Vurgu yeri',
    'uzun-unlu': 'Uzun ünlü',
    dogallik: 'Konuşma tarzı',
    vurgu: 'Vurgu/tonlama',
    telaffuz: 'Telaffuz',
  };
  const issueRows = Object.entries(s.issuesByKind)
    .sort((a,b) => b[1] - a[1])
    .map(([kind, count]) => {
      const max = Math.max(...Object.values(s.issuesByKind));
      const pct = (count / max) * 100;
      return `
        <div class="issue-bar-row">
          <div class="issue-bar-label">${KIND_LABELS[kind] || kind}</div>
          <div class="issue-bar-track"><div class="issue-bar-fill" style="width:${pct}%"></div></div>
          <div class="issue-bar-count">${count}</div>
        </div>`;
    }).join('');

  const wordChips = s.wordErrors.length
    ? s.wordErrors.map(([w, c]) => `<span class="word-chip">${escapeHtml(w)} <span style="opacity:0.7">×${c}</span></span>`).join('')
    : '<div class="empty" style="border:0; padding:8px">Henüz kelime hatası yok 🎉</div>';

  // Override: gridEl'i tek panel ile doldur
  gridEl.innerHTML = `
    <div class="progress-panel" style="grid-column: 1 / -1;">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Toplam alıştırma</div>
          <div class="stat-value">${s.total}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Ortalama skor</div>
          <div class="stat-value">${(s.avgScore*100).toFixed(0)}<span style="font-size:18px;color:var(--muted)">/100</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Son 10 ortalaması</div>
          <div class="stat-value">${(s.lastTenAvg*100).toFixed(0)}<span style="font-size:18px;color:var(--muted)">/100</span></div>
          <div class="stat-sub">${s.lastTenAvg >= s.avgScore ? '↑ ortalamanın üstünde' : '↓ ortalamanın altında'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">En yüksek</div>
          <div class="stat-value">${(s.bestScore*100).toFixed(0)}<span style="font-size:18px;color:var(--muted)">/100</span></div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Skor Zaman Çizelgesi (son ${Math.min(50, s.history.length)} alıştırma)</div>
        <canvas id="score-chart"></canvas>
      </div>

      <div class="chart-card">
        <div class="chart-title">En sık görülen hata türleri</div>
        ${issueRows || '<div class="empty" style="border:0; padding:8px">Henüz hata yok 🎉</div>'}
      </div>

      <div class="chart-card">
        <div class="chart-title">En çok zorlandığın kelimeler</div>
        <div class="word-list">${wordChips}</div>
      </div>

      <div style="text-align:right">
        <button class="clear-btn" onclick="clearHistory()">🗑 Tüm kayıtları temizle</button>
      </div>
    </div>`;

  // Skor grafiği — basit canvas
  drawScoreChart(s.history.slice(-50));
}

function drawScoreChart(history) {
  const canvas = document.getElementById('score-chart');
  if (!canvas || !history.length) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const w = rect.width, h = rect.height;
  const pad = { top: 10, right: 10, bottom: 22, left: 28 };
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;

  // Y eksen çizgileri (0/50/100)
  ctx.strokeStyle = '#e5e7eb';
  ctx.fillStyle = '#94a3b8';
  ctx.font = '11px system-ui';
  ctx.lineWidth = 1;
  for (const v of [0, 50, 100]) {
    const y = pad.top + plotH - (v / 100) * plotH;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + plotW, y);
    ctx.stroke();
    ctx.fillText(v.toString(), 4, y + 3);
  }

  // Skor noktaları + çizgi
  const n = history.length;
  const stepX = n > 1 ? plotW / (n - 1) : 0;
  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const x = pad.left + i * stepX;
    const y = pad.top + plotH - history[i].score * plotH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Noktalar (renk = verdict)
  const verdictColors = {
    mukemmel: '#156c2c', iyi: '#2c7a7a', gelistirilebilir: '#b07300', tekrar: '#c0392b'
  };
  for (let i = 0; i < n; i++) {
    const x = pad.left + i * stepX;
    const y = pad.top + plotH - history[i].score * plotH;
    ctx.fillStyle = verdictColors[history[i].verdict] || '#0f172a';
    ctx.beginPath();
    ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function renderGrid() {
  // Standart kart görünümü için grid layout'u geri yükle
  gridEl.style.display = '';
  const items = activeType === 'all'
    ? allExercises
    : allExercises.filter(ex => ex.type === activeType);

  if (activeType === 'all') {
    listTitle.textContent = `Tüm alıştırmalar (${items.length})`;
  } else {
    const meta = TYPE_LABELS[activeType] || { label: activeType };
    listTitle.textContent = `${meta.label} (${items.length})`;
  }

  gridEl.innerHTML = '';
  if (!items.length) {
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  for (const ex of items) {
    const card = document.createElement('button');
    card.className = 'ex-card';
    card.dataset.id = ex.id;
    if (currentExercise && currentExercise.id === ex.id) card.classList.add('active');

    const text = ex.text || '';
    const preview = text.length > 90 ? text.slice(0, 90).trim() + '…' : text;
    const diff = Math.max(1, Math.min(5, ex.difficulty || 1));
    const dots = Array.from({length: 5}, (_, i) =>
      `<span class="${i < diff ? 'on' : ''}"></span>`).join('');
    const focus = ex.focus ? `<span class="focus-tag">${escapeHtml(ex.focus)}</span>` : '';

    card.innerHTML = `
      <div class="ex-card-text">${escapeHtml(preview)}</div>
      <div class="ex-card-meta">
        ${focus}
        <span class="difficulty" title="Zorluk ${diff}/5" aria-label="Zorluk ${diff}/5">${dots}</span>
      </div>
    `;
    card.addEventListener('click', () => selectExercise(ex));
    gridEl.appendChild(card);
  }
}

function selectExercise(ex) {
  currentExercise = ex;
  for (const c of gridEl.querySelectorAll('.ex-card')) {
    c.classList.toggle('active', c.dataset.id === ex.id);
  }
  renderTargetDisplay(ex.text);
  recorderEl.style.display = 'block';
  placeholderEl.style.display = 'none';
  refAudio.style.display = 'none';
  refAudio.pause();
  resultCard.style.display = 'none';
  hideTooltip();
  statusEl.textContent = '';
  // scrollIntoView kaldırıldı — kullanıcı seçince sayfa kaymıyor
}

listenBtn.addEventListener('click', () => {
  if (!currentExercise) return;
  refAudio.src = API + '/reference/' + encodeURIComponent(currentExercise.id);
  refAudio.style.display = 'block';
  refAudio.play();
});

recBtn.addEventListener('click', async () => {
  if (!currentExercise) { alert('Önce bir alıştırma seç.'); return; }
  resultCard.style.display = 'none';
  hideTooltip();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = onStopRecording;
    mediaRecorder.start();
    statusEl.innerHTML = '<span class="recording-dot"></span>Kaydediliyor… metni oku, bitince Durdur.';
    recBtn.disabled = true;
    stopBtn.disabled = false;
  } catch (e) {
    statusEl.textContent = 'Mikrofon hatası: ' + e;
  }
});

stopBtn.addEventListener('click', () => {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  recBtn.disabled = false;
  stopBtn.disabled = true;
});

async function onStopRecording() {
  const blob = new Blob(chunks, { type: 'audio/webm' });
  playback.src = URL.createObjectURL(blob);
  playback.style.display = 'block';
  statusEl.textContent = 'Sunucuya gönderiliyor, skor hesaplanıyor…';
  const fd = new FormData();
  fd.append('audio', blob, 'recording.webm');
  fd.append('target_text', currentExercise.text);
  try {
    const res = await fetch(API + '/assess', { method: 'POST', body: fd });
    if (!res.ok) {
      statusEl.textContent = 'Sunucu hatası: ' + res.status;
      const txt = await res.text();
      resultCard.style.display = 'block';
      verdictBox.innerHTML = '<pre>' + escapeHtml(txt) + '</pre>';
      return;
    }
    const data = await res.json();
    statusEl.textContent = 'Sonuç hazır.';
    // localStorage'a kayıt
    saveAttempt({
      ts: new Date().toISOString(),
      exercise_id: currentExercise ? currentExercise.id : null,
      target: data.target_text,
      score: data.overall_score || 0,
      verdict: data.verdict,
      issues: (data.issues || []).map(i => ({
        kind: i.kind, target_word: i.target_word || '', char: i.char || ''
      })),
    });
    // İlerleme tab'ındaki sayıyı güncelle
    const histTab = tabsEl.querySelector('[data-type="_progress"] .count');
    if (histTab) histTab.textContent = loadHistory().length;
    renderResult(data);
  } catch (e) {
    statusEl.textContent = 'Ağ hatası: ' + e;
  }
}

function renderResult(data) {
  resultCard.style.display = 'block';
  const v = data.verdict || '';
  verdictBox.innerHTML = `
    <div class="verdict ${v}">
      <span>${headerFor(v)}</span>
      <span class="score-pill">${(data.overall_score*100).toFixed(0)}/100</span>
    </div>
  `;
  renderedTarget.innerHTML = renderTargetWithIssues(data.target_text, data.issues || []);
  renderedTarget.insertAdjacentHTML('beforeend', renderLegend(data.issues || []));
  attachWordTooltips(data.issues || []);

  let meta = '';
  if (data.transcription !== undefined && data.transcription !== null) {
    meta += `<b>Hedef:</b> <span>${escapeHtml(data.target_text)}</span>`;
    meta += `<b>Söylediğin:</b> <span>${escapeHtml(data.transcription)}</span>`;
    meta += `<b>Eşleşme:</b> <span>${Math.round((data.transcription_match || 0) * 100)}%</span>`;
  }
  const nonWordIssues = (data.issues || []).filter(i => !WORD_ERROR_KINDS.has(i.kind));
  const naturalnessIssues = nonWordIssues.filter(i => i.kind === 'dogallik');
  const otherIssues = nonWordIssues.filter(i => i.kind !== 'dogallik');
  if (naturalnessIssues.length) {
    meta += `<b style="color:#7a3aa8">Konuşma tarzı:</b><div>`;
    for (const it of naturalnessIssues) {
      meta += `<div style="margin-top:4px; padding-left:8px; border-left:3px solid #c8a8e3">${escapeHtml(it.char)} ${escapeHtml(it.advice)}</div>`;
    }
    meta += `</div>`;
  }
  if (otherIssues.length) {
    meta += `<b>Diğer notlar:</b><div>`;
    for (const it of otherIssues) {
      meta += `<div style="margin-top:4px">• <b>'${escapeHtml(it.char)}'</b> [${it.kind}]: ${escapeHtml(it.advice)}</div>`;
    }
    meta += `</div>`;
  }
  metaEl.innerHTML = meta;

  if (data.segments) {
    segmentsEl.textContent = data.segments
      .map(s => `${s.char.padEnd(3)} ${s.start_s.toFixed(2)}s-${s.end_s.toFixed(2)}s  score=${s.score.toFixed(2)}`)
      .join('\n');
  }
}

const WORD_ERROR_KINDS = new Set(['kelime', 'kritik_unsuz', 'r_yutulmasi', 'h_yutulmasi', 'vurgu_yeri']);

function renderTargetWithIssues(text, issues) {
  const wordIssues = {};
  for (const it of issues) {
    if (WORD_ERROR_KINDS.has(it.kind) && it.word_index >= 0) {
      wordIssues[it.word_index] = it;
    }
  }
  const tokens = text.split(/(\s+)/);
  let wordIdx = 0;
  return tokens.map(tok => {
    if (/^\s+$/.test(tok)) return tok;
    const issue = wordIssues[wordIdx];
    const idx = wordIdx;
    wordIdx++;
    if (issue) {
      const klass = `word error ${issue.kind}`;
      return `<span class="${klass}" data-issue-index="${idx}">${escapeHtml(tok)}</span>`;
    }
    return `<span class="word">${escapeHtml(tok)}</span>`;
  }).join('');
}

function renderLegend(issues) {
  const present = new Set(issues.filter(it => WORD_ERROR_KINDS.has(it.kind)).map(it => it.kind));
  if (!present.size) return '';
  const labels = {
    kelime: 'Genel kelime hatası',
    kritik_unsuz: 'Ünsüz değişimi (k↔g, t↔d…)',
    r_yutulmasi: 'R yutulması',
    h_yutulmasi: 'H yutulması',
    vurgu_yeri: 'Vurgu yeri sapması',
  };
  let parts = [];
  for (const kind of present) {
    parts.push(`<span class="legend-item"><span class="legend-swatch ${kind}" style="background: var(--${kind === 'kelime' ? 'error' : 'warn'})"></span>${labels[kind]||kind}</span>`);
  }
  return `<div class="legend">${parts.join('')}</div>`;
}

function attachWordTooltips(issues) {
  const wordIssuesByIdx = {};
  for (const it of issues) {
    if (WORD_ERROR_KINDS.has(it.kind) && it.word_index >= 0) {
      wordIssuesByIdx[it.word_index] = it;
    }
  }
  const errorSpans = renderedTarget.querySelectorAll('.word.error');
  errorSpans.forEach(span => {
    span.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(span.getAttribute('data-issue-index'), 10);
      const issue = wordIssuesByIdx[idx];
      if (!issue) return;
      errorSpans.forEach(s => s.classList.remove('active'));
      span.classList.add('active');
      showTooltip(span, issue);
    });
  });
}

function showTooltip(span, issue) {
  const rect = span.getBoundingClientRect();
  let html = '';
  if (issue.target_word && issue.spoken_word) {
    html += `<b>Hedef:</b> ${escapeHtml(issue.target_word)} &nbsp; <b>Söylediğin:</b> ${escapeHtml(issue.spoken_word)}<br>`;
  } else if (issue.target_word) {
    html += `<b>Atlanmış:</b> ${escapeHtml(issue.target_word)}<br>`;
  }
  html += escapeHtml(issue.advice || '');
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (rect.left + window.scrollX) + 'px';
  tooltip.style.top = (rect.bottom + window.scrollY + 8) + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  document.querySelectorAll('.word.error.active').forEach(s => s.classList.remove('active'));
}

document.addEventListener('click', e => {
  if (e.target.closest('.word.error')) return;
  hideTooltip();
});

function headerFor(v) {
  return ({
    mukemmel: '🌟 Mükemmel',
    iyi: '👍 İyi',
    gelistirilebilir: '⚠️ Geliştirilebilir',
    tekrar: '🔁 Tekrar dene',
  })[v] || 'Sonuç';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'": '&#39;'
  }[c]));
}

// Tek seferlik SW + cache temizleme (eski Bento/Studio versiyonlarını boşaltmak için).
// localStorage flag ile sonsuz loop'u engelle.
if ('serviceWorker' in navigator) {
  const FLAG = 'sw-clean-v5-bento-flush';
  if (!localStorage.getItem(FLAG)) {
    (async () => {
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) await r.unregister();
        const keys = await caches.keys();
        for (const k of keys) await caches.delete(k);
        localStorage.setItem(FLAG, '1');
        location.reload();
      } catch (e) {
        console.warn('SW temizlik başarısız:', e);
        localStorage.setItem(FLAG, '1');
      }
    })();
  } else {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/sw.js', { scope: '/static/' })
        .then(reg => console.log('SW kayıtlı, scope:', reg.scope))
        .catch(err => console.warn('SW kayıt başarısız:', err));
    });
  }
}

loadExercises();
loadAvailableClips();
loadVideoLibrary();
